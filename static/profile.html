<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOT CV - Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="nav-shell">
        <div class="nav-left">
          <div class="logo-chip" role="button" aria-label="HOT CV" onclick="window.location.href='/'">
            <img 
              src="/static/logo/hotcv-dark.svg" 
              alt="HOT CV Logo" 
              style="max-height: 40px; width: auto;"
            />
          </div>
          <nav class="main-nav" aria-label="Primary">
            <a class="nav-link" href="/">Việc Làm IT</a>
            <a class="nav-link" href="/">Top Công ty IT</a>
            <a class="nav-link" href="/">Blog</a>
            <a class="nav-link" href="/">Lĩnh vực IT</a>
          </nav>
        </div>
        <div class="nav-right">
          <button class="icon-btn" type="button" aria-label="Thông báo">🔔</button>
          <div class="nav-lang" aria-label="Ngôn ngữ">
            <button type="button" class="lang active">VI</button>
            <button type="button" class="lang">EN</button>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Hồ sơ cá nhân</h2>
        <p class="meta">Cập nhật thông tin để nhà tuyển dụng hiểu rõ hơn về bạn.</p>
        <form id="form-profile-page">
          <div class="field">
            <label for="p-full-name">Họ tên</label>
            <input id="p-full-name" name="full_name" type="text" required />
          </div>
          <div class="field">
            <label for="p-email">Email</label>
            <input id="p-email" name="email" type="email" disabled />
          </div>
          <div class="field">
            <label for="p-headline">Tiêu đề ngắn</label>
            <input id="p-headline" name="headline" type="text" placeholder="VD: Backend Developer (Python/FastAPI)" />
          </div>
          <div class="field">
            <label for="p-location">Địa điểm</label>
            <input id="p-location" name="location" type="text" placeholder="VD: Hà Nội, TP.HCM" />
          </div>
          <div class="field">
            <label for="p-skills">Kỹ năng chính (phân cách bằng dấu phẩy)</label>
            <input id="p-skills" name="skills" type="text" placeholder="Python, FastAPI, PostgreSQL" />
          </div>
          <div class="field">
            <label for="p-bio">Mô tả ngắn</label>
            <textarea id="p-bio" name="bio" rows="4" placeholder="Tóm tắt kinh nghiệm, thế mạnh, định hướng..."></textarea>
          </div>
          <div class="actions">
            <button type="submit" class="btn">Lưu thông tin</button>
            <button type="button" class="btn btn-ghost" id="p-back">Về trang chính</button>
          </div>
        </form>
      </section>
    </main>

    <script>
      const token = localStorage.getItem("jp_token") || "";
      const API = "";

      async function api(path, options = {}) {
        const headers = { ...(options.headers || {}) };
        if (token) headers.Authorization = `Bearer ${token}`;
        const body = options.body;
        if (body && typeof body === "object" && !(body instanceof FormData)) {
          headers["Content-Type"] = "application/json";
          options.body = JSON.stringify(body);
        }
        const response = await fetch(API + path, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.detail || response.statusText);
        return data;
      }

      function showToast(message, isError = false) {
        let el = document.getElementById("toast");
        if (!el) {
          el = document.createElement("div");
          el.id = "toast";
          document.body.appendChild(el);
        }
        el.textContent = message;
        el.className = isError ? "error" : "";
        el.style.display = "block";
        clearTimeout(showToast._timer);
        showToast._timer = setTimeout(() => {
          el.style.display = "none";
        }, 3200);
      }

      async function loadProfile() {
        try {
          const me = await api("/auth/me");
          document.getElementById("p-full-name").value = me.full_name || "";
          document.getElementById("p-email").value = me.email || "";
          document.getElementById("p-headline").value = me.headline || "";
          document.getElementById("p-location").value = me.location || "";
          document.getElementById("p-skills").value = me.skills || "";
          document.getElementById("p-bio").value = me.bio || "";
        } catch (error) {
          showToast(error.message || "Không tải được hồ sơ", true);
        }
      }

      async function saveProfile(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const payload = {
          full_name: formData.get("full_name"),
          headline: formData.get("headline"),
          location: formData.get("location"),
          skills: formData.get("skills"),
          bio: formData.get("bio"),
        };
        try {
          await api("/users/me", { method: "PATCH", body: payload });
          showToast("Đã lưu hồ sơ cá nhân.");
        } catch (error) {
          showToast(error.message || "Không thể lưu hồ sơ", true);
        }
      }

      document.getElementById("form-profile-page").addEventListener("submit", saveProfile);
      document.getElementById("p-back").addEventListener("click", () => (window.location.href = "/"));

      if (!token) {
        showToast("Vui lòng đăng nhập để chỉnh sửa hồ sơ.", true);
      } else {
        loadProfile();
      }
    </script>
  </body>
</html>
